<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Launcher Panel</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 100vh;
            background: #111;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 280px;
        }
        button {
            padding: 15px 20px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: #222;
            border: 2px solid #444;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover {
            background: #333;
            border-color: #666;
        }
        /* Highlight styling for Shell Shockers */
        #launchBtn {
            background: #f05a28;
            border-color: #ff7342;
        }
        #launchBtn:hover {
            background: #d0481b;
            border-color: #f05a28;
        }
    </style>
</head>
<body>

    <div class="btn-container">
        <button onclick="executeBlossom()">#1 Blossom Games</button>
        <button onclick="executeGnMath()">#2 GN Math</button>
        <button onclick="executeThree()">#3 GN Math Alt</button>
    </div>

    <script>
        // Universal opener helper function to eliminate boilerplate duplication
        function launchInBlank(htmlContent) {
            const blankWindow = window.open('about:blank', '_blank');
            if (!blankWindow) {
                alert('Popup blocked! Please allow popups for this site.');
                return;
            }
            blankWindow.document.open();
            blankWindow.document.write(htmlContent);
            blankWindow.document.close();
        }

        async function executeBlossom() {
            const url = 'https://cdn.jsdelivr.net/gh/blossom-games/blossomgames@latest/blossomsinglefile.html';
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`Status: ${response.status}`);
                const htmlContent = await response.text();
                launchInBlank(htmlContent);
            } catch (error) {
                alert(`Blossom Failed: ${error.message}`);
            }
        }

        async function executeGnMath() {
            const url = 'https://cdn.jsdelivr.net/npm/gn-math.github.io-main@1.0.5/singlefile.html';
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`Status: ${response.status}`);
                const htmlContent = await response.text();
                launchInBlank(htmlContent);
            } catch (error) {
                alert(`GN Math Failed: ${error.message}`);
            }
        }

        async function executeThree() {
            const url = 'https://gist.githubusercontent.com/gdplayer9001-stack/59d6a8b124e82fba41bed018d8aade56/raw/492db0757bd03c3b3dd04ec65fdc0f0a7297258b/gistfile1.html';
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`Status: ${response.status}`);
                const htmlContent = await response.text();
                launchInBlank(htmlContent);
            } catch (error) {
                alert(`Button 3 Failed: ${error.message}`);
            }
        }
        // https://jsitor.com/embed/3ZCiH53DzV 

    </script>
</body>
</html>
