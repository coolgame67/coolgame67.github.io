<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Gist Launcher</title>
	<!-- 1. External Sidebar CSS Reference -->
	<link rel="stylesheet" href="sidebar.css">
	<style>
		body {
			font-family: system-ui, -apple-system, sans-serif;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			margin: 0;
			background-color: #f6f8fa;
			user-select: none;
			/* Prevents text highlighting */
			-webkit-user-select: none;
			position: relative;
			overflow: hidden;
		}

		/* Forces sidebar out of the flex layout flow */
		#sidebar {
			position: fixed;
			top: 0;
			left: 0;
			height: 100vh;
			z-index: 1000;
		}

		/* Scoped selector to keep your center button design clean */
		.launcher-btn {
			position: relative;
			z-index: 1;
			background-color: #6f42c1;
			color: white;
			border: none;
			padding: 15px 30px;
			font-size: 16px;
			font-weight: 600;
			border-radius: 6px;
			cursor: pointer;
			box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
			transition: background 0.1s;
		}

		.launcher-btn:hover {
			background-color: #5a32a3;
		}
	</style>
</head>

<body>

    <div id="sidebar" class="sidebar">
        <button id="sidebar-toggle" class="toggle-btn">➔</button>
        <nav id="sidebar-nav"></nav>
	</div>

	<!-- 3. Central Interactive App Launcher Button -->
	<button class="launcher-btn" onclick="runInAboutBlank()">he he he</button>

	<!-- 4. External Sidebar JS Reference -->
	<script src="sidebar.js"></script>

	<script>
		// Anti-debugging and Launcher security system
		const _0x5a1b = "aHR0cHM6Ly9naXN0LmdpdGh1YnVzZXJjb250ZW50LmNvbS9jb29sZ2FtZTY3L2U1ZGFjNTc5MGRhYmRmMmQ3M2NkZDA3Njc4MjkzY2FlL3Jhdy9mNGQwN2QxYmZiYTA0ZTQxZGQyNGNlMWVkNjkwOTZjM2YzMmZmZmFlL3NoZWxsc2hvY2tlcnMuaHRtbA==";

		// 1. Block Right-Click Context Menu
		document.addEventListener('contextmenu', event => event.preventDefault());

		// 2. Block Keyboard Shortcuts (F12, Inspect, View Source, Console)
		document.addEventListener('keydown', (e) => {
			if (e.key === 'F12') {
				e.preventDefault();
				return false;
			}
			if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
				e.preventDefault();
				return false;
			}
			if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'J' || e.key === 'j')) {
				e.preventDefault();
				return false;
			}
			if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u')) {
				e.preventDefault();
				return false;
			}
			if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
				e.preventDefault();
				return false;
			}
		});

		// 3. Anti-Debugging Loop
		setInterval(function() {
			(function() {
				return false;
			}['constructor']('debugger')());
		}, 100);

		// Launcher Logic
		async function runInAboutBlank() {
			const blankWindow = window.open('about:blank', '_blank');
			
			if (!blankWindow) {
				alert('Popup blocked! Please allow popups for this file to let it open.');
				return;
			}

			try {
				const targetUrl = window.atob(_0x5a1b);
				const response = await fetch(targetUrl);
				if (!response.ok) throw new Error('Could not fetch the raw file.');
				
				const htmlContent = await response.text();

				blankWindow.document.open();
				blankWindow.document.write(htmlContent);
				blankWindow.document.close();

			} catch (error) {
				blankWindow.close();
				alert(`Execution Error: ${error.message}`);
			}
		}
	</script>

</body>

</html>
